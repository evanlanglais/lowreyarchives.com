services:
  app:
    build:
      context: .
      args:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_KEY: ${SUPABASE_KEY}
    image: lowreyarchives:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    networks:
      - web

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
    enable_ipv6: true
